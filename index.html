<!DOCTYPE html>
<html>
<head>
    <title>Veltri Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #0b0b0e;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-box {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: #1a1a1e;
            padding: 20px;
            border: none;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
        }
        h1 {
            color: #2b6ef0;
            text-align: center;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .logout-btn {
            background: #ff4444;
            padding: 8px 16px;
            border-radius: 30px;
            border: none;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
        .logout-btn:hover {
            background: #cc0000;
        }
        #stories-bar {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 5px;
            margin-bottom: 10px;
            background: #121214;
            border-radius: 12px;
            border: 1px solid #2c2c30;
            scrollbar-width: none;
        }
        #stories-bar::-webkit-scrollbar {
            display: none;
        }
        .story-item {
            min-width: 65px;
            text-align: center;
            cursor: pointer;
        }
        .story-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            font-size: 20px;
            font-weight: bold;
            color: white;
            border: 2px solid #ff6b6b;
        }
        .story-avatar.my-story {
            background: #2b6ef0;
            border: 2px solid #2b6ef0;
        }
        .story-avatar.friend {
            background: #ff6b6b;
        }
        .story-name {
            color: #6b6b70;
            font-size: 10px;
            margin-top: 4px;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 60px;
        }
        #messages {
            background: #121214;
            flex: 1;
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            color: #e4e4e7;
            border: 1px solid #2c2c30;
            display: flex;
            flex-direction: column;
        }
        .input-area {
            display: flex;
            gap: 8px;
        }
        #messageInput {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: #2a2a2e;
            color: white;
            font-size: 15px;
            outline: none;
        }
        button {
            background: #2b6ef0;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }
        button:hover {
            background: #1a5adf;
        }
        #snapToggle {
            background: #444;
            padding: 12px 14px;
            border-radius: 30px;
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        #snapToggle.on {
            background: #ff6b6b;
        }
        .message-bubble {
            background: #2b6ef0;
            padding: 8px 14px;
            border-radius: 18px;
            margin-bottom: 6px;
            max-width: 80%;
            align-self: flex-end;
            color: white;
            word-wrap: break-word;
        }
        .message-bubble.received {
            background: #2a2a2e;
            align-self: flex-start;
            color: #e4e4e7;
        }
        .message-bubble.snap {
            border: 2px solid #ff6b6b;
            background: #2a1a1a;
            color: #ff6b6b;
        }
        .message-bubble img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 5px;
        }
        .camera-btn {
            background: #25d366;
        }
        .camera-btn:hover {
            background: #1aaa55;
        }
    </style>
</head>
<body>
    <div class="chat-box">
        <div class="header">
            <h1>💬 Veltri</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div id="stories-bar"></div>
        <div id="messages"></div>

        <div class="input-area">
            <input id="messageInput" placeholder="Type a message...">
            <button id="snapToggle" onclick="toggleSnap()">📸 Off</button>
            <button onclick="sendMessage()">Send</button>
            <button onclick="openCamera()" class="camera-btn">📷</button>
        </div>
    </div>

    <script>
        const username = localStorage.getItem('username');
        if (!username) {
            window.location.href = '/login-page';
        }

        let snapMode = false;

        function toggleSnap() {
            snapMode = !snapMode;
            const btn = document.getElementById('snapToggle');
            if (snapMode) {
                btn.textContent = '📸 On';
                btn.classList.add('on');
            } else {
                btn.textContent = '📸 Off';
                btn.classList.remove('on');
            }
        }

        function logout() {
            localStorage.removeItem('username');
            window.location.href = '/login-page';
        }

        function openCamera() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    const imageData = e.target.result;
                    try {
                        await fetch('/upload-image', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: username,
                                image: imageData,
                                snap: snapMode
                            })
                        });
                        loadMessages();
                    } catch (error) {
                        console.error('Error uploading image:', error);
                    }
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        async function postStory() {
            const storyText = prompt("What's on your mind? (24h story)");
            if (!storyText) return;

            try {
                await fetch('/post-story', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, content: storyText })
                });
                loadStories();
            } catch (error) {
                console.error('Error posting story:', error);
            }
        }

        async function loadStories() {
            try {
                const response = await fetch('/get-stories');
                const stories = await response.json();
                const storiesBar = document.getElementById('stories-bar');
                storiesBar.innerHTML = '';

                const myStoryDiv = document.createElement('div');
                myStoryDiv.className = 'story-item';
                myStoryDiv.innerHTML = `
                    <div class="story-avatar my-story">+</div>
                    <span class="story-name">My Story</span>
                `;
                myStoryDiv.onclick = postStory;
                storiesBar.appendChild(myStoryDiv);

                stories.forEach(story => {
                    if (story.username !== username) {
                        const storyDiv = document.createElement('div');
                        storyDiv.className = 'story-item';
                        storyDiv.innerHTML = `
                            <div class="story-avatar friend">${story.username[0].toUpperCase()}</div>
                            <span class="story-name">${story.username}</span>
                        `;
                        storyDiv.onclick = () => {
                            alert(`📖 ${story.username}'s Story:\n\n"${story.content}"`);
                        };
                        storiesBar.appendChild(storyDiv);
                    }
                });
            } catch (error) {
                console.error('Error loading stories:', error);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const messagesDiv = document.getElementById('messages');
            const text = input.value.trim();
            
            if (text === '') return;

            const myMsg = document.createElement('div');
            myMsg.className = 'message-bubble';
            if (snapMode) {
                myMsg.classList.add('snap');
                myMsg.textContent = text + ' 🔥';
            } else {
                myMsg.textContent = text;
            }
            messagesDiv.appendChild(myMsg);
            input.value = '';

            try {
                await fetch('/send-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, content: text, snap: snapMode })
                });
            } catch (error) {
                console.error('Error sending message:', error);
            }

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function loadMessages() {
            try {
                const response = await fetch('/get-messages');
                const messages = await response.json();
                const messagesDiv = document.getElementById('messages');
                messagesDiv.innerHTML = '';
                messages.forEach(msg => {
                    const bubble = document.createElement('div');
                    bubble.className = 'message-bubble';
                    if (msg.username !== username) {
                        bubble.classList.add('received');
                    }
                    if (msg.snap) {
                        bubble.classList.add('snap');
                    }
                    if (msg.is_image) {
                        bubble.innerHTML = `<img src="${msg.content}" alt="Image">`;
                    } else {
                        bubble.textContent = msg.content + (msg.snap ? ' 🔥' : '');
                    }
                    messagesDiv.appendChild(bubble);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        loadMessages();
        loadStories();
        setInterval(loadMessages, 3000);
        setInterval(loadStories, 10000);
    </script>
</body>
</html>
