<!DOCTYPE html>
<html>
<head>
    <title>Veltri - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #0b0b0e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: #1a1a1e;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #2c2c30;
            width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        h1 {
            color: #2b6ef0;
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #6b6b70;
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: #2a2a2e;
            color: white;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: #2b6ef0;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        button:hover {
            background: #1a5adf;
        }
        .switch {
            text-align: center;
            color: #6b6b70;
            font-size: 14px;
        }
        .switch a {
            color: #2b6ef0;
            cursor: pointer;
            text-decoration: none;
        }
        .switch a:hover {
            text-decoration: underline;
        }
        #message {
            text-align: center;
            color: #25d366;
            margin-top: 10px;
            font-size: 14px;
        }
        .error {
            color: #ff4444 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💬 Veltri</h1>
        <p class="subtitle" id="form-title">Sign up to start chatting</p>
        
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        
        <button id="action-btn">Sign Up</button>
        
        <div class="switch">
            <span id="switch-text">Already have an account?</span>
            <a id="switch-link">Log In</a>
        </div>
        
        <div id="message"></div>
    </div>

    <script>
        let isLogin = false;

        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const actionBtn = document.getElementById('action-btn');
        const formTitle = document.getElementById('form-title');
        const switchText = document.getElementById('switch-text');
        const switchLink = document.getElementById('switch-link');
        const messageDiv = document.getElementById('message');

        function showMessage(text, isError = false) {
            messageDiv.textContent = text;
            messageDiv.className = isError ? 'error' : '';
        }

        function clearMessage() {
            messageDiv.textContent = '';
            messageDiv.className = '';
        }

        function toggleForm() {
            isLogin = !isLogin;
            if (isLogin) {
                formTitle.textContent = 'Log in to continue';
                actionBtn.textContent = 'Log In';
                switchText.textContent = "Don't have an account?";
                switchLink.textContent = 'Sign Up';
            } else {
                formTitle.textContent = 'Sign up to start chatting';
                actionBtn.textContent = 'Sign Up';
                switchText.textContent = 'Already have an account?';
                switchLink.textContent = 'Log In';
            }
            clearMessage();
        }

        switchLink.addEventListener('click', toggleForm);

        async function handleAction() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showMessage('Please fill in all fields.', true);
                return;
            }

            const endpoint = isLogin ? '/login' : '/signup';
            const url = window.location.origin + endpoint;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message);
                    // Store username in localStorage
                    localStorage.setItem('username', username);
                    // Redirect to chat after 1 second
                    setTimeout(() => {
                        window.location.href = window.location.origin + '/chat';
                    }, 1000);
                } else {
                    showMessage(data.error || 'Something went wrong.', true);
                }
            } catch (error) {
                showMessage('Network error. Please try again.', true);
                console.error('Error:', error);
            }
        }

        actionBtn.addEventListener('click', handleAction);

        // Allow Enter key to submit
        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleAction();
        });
        usernameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') passwordInput.focus();
        });
    </script>
</body>
</html>
